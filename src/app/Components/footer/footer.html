<footer class="bg-main-light py-5">
    <div class="container">
        <h2 class="m-0 h4">{{"footer.title" | translate}}</h2>
        <p class="text-muted small">
            {{"footer.description" | translate}}
        </p>

        <!-- inputs design  -->
        <div class="d-flex align-items-center gap-3 text-nowrap ms-4">
            <input type="text" class="form-control" [placeholder]="'footer.emailPlaceholder' | translate" />
            <button class="btn-main">{{"footer.shareBtn" | translate}}</button>
        </div>

        <hr class="ms-2" />

        <!-- footer payment Details Design  -->
        <div class="pay-details d-flex justify-content-between align-items-center ms-4">
            <div class="d-flex align-items-center gap-2">
                <h3 class="h6 m-0">{{"footer.paymentPartners" | translate}}</h3>
                <img src="./images/amazon-pay.png" width="30px" alt="" />
                <img src="./images/American-Express-Color.png" width="30px" alt="" />
                <img src="./images/paypal.png" width="30px" alt="" />
                <img src="./images/mastercard.webp" width="30px" alt="" />
            </div>

            <div class="d-flex align-items-center gap-2">
                <h3 class="h6 m-0">{{"footer.getDeliveries" | translate}}</h3>
                <img src="./images/get-google-play.png" width="75px" alt="" />
                <img src="./images/get-apple-store.png" width="75px" alt="" />
            </div>
        </div>
        <hr class="ms-2" />

    </div>
</footer>
