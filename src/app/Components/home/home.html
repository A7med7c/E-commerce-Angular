<section class="home-products py-3">
    <h4 class="fw-bold mb-4">Popular Products</h4>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 row-cols-xl-5 row-cols-xxl-6 g-3">

        @for (product of productList.slice(0, 12); track product.id) {
        <div class="col-12 col-sm-6 col-md-4 col-lg-3">

            <div class="card  h-100 shadow-sm border-0 p-2">

                <img [src]="product.imageCover" class="w-100 object-fit-cover rounded" style="height: 220px;"
                    [alt]="product.title">

                <div class="mt-2">

                    <h6 class="small text-success mb-1">
                        {{ product.category.name }}
                    </h6>

                    <h6 class="mb-2">
                        {{ product.title.split(' ', 2).join(' ') }}
                    </h6>

                    <div class="d-flex justify-content-between align-items-center">

                        <span class="fw-bold">
                            {{ product.price }} EGP
                        </span>

                        <div>
                            <i class="fas fa-star text-warning"></i>
                            <span class="text-muted ms-1">
                                {{ product.ratingsAverage }}
                            </span>
                        </div>

                    </div>

                </div>

                <button class="btn btn-main w-100">Add To Cart</button>
            </div>
        </div>
        }

    </div>
</section>
