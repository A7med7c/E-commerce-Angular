@if (cartDetails) {
<section class="container">
    <div class="d-flex align-items-center justify-content-between">
        <div>
            <h1 class="h2">Shop Cart:</h1>
            <p class=" text-main">Total Price:{{cartDetails.totalCartPrice | currency: "GBP"}}</p>
        </div>
        <div>
            <button (click)="removeAllItems()" class="btn btn-outline-danger btn-sm" [disabled]="isCartEmpty">
                Clear Cart
            </button>
        </div>

    </div>

    @for (cartItem of cartDetails.products; track cartItem.product.id) {
    <div class="row mb-1 border-bottom">
        <div class="col-md-1">
            <img [src]="cartItem.product.imageCover" class="w-100" [alt]="cartItem.product.title">
        </div>
        <div class="col-md-11 d-flex justify-content-between align-items-center">
            <div>
                <h3 class="h5">{{cartItem.product.title}}</h3>
                <p class="text-main m-0">{{cartItem.price |currency:'GBP'}}</p>

                <button class="text-danger cr btn p-0" (click)="removeItem(cartItem.product.id)">
                    <i class="fa-regular fa-trash-can"></i>
                </button>
            </div>
            <div class="d-flex align-items-center gap-2">
                <span (click)="updateCount(cartItem.product.id,cartItem.count + 1)" class="text-main cr"><i
                        class="fa-solid fa-circle-plus fa-2xl"></i></span>
                <span>{{cartItem.count}}</span>
                <span (click)="updateCount(cartItem.product.id,cartItem.count - 1)" class="text-main cr"><i
                        class="fa-solid fa-circle-minus fa-2xl"></i></span>
            </div>
        </div>
    </div>
    }
</section>
}
